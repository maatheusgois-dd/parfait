name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - site/**
      - .github/workflows/deploy-site.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    # GitHub Actions does not allow the `secrets` context directly inside an
    # `if:` conditional at any level (confirmed with actionlint: only env,
    # github, inputs, job, matrix, needs, runner, steps, strategy, vars are
    # valid there). The documented workaround is to mirror the secret into a
    # job-level env var, then gate steps on that env var instead — this is
    # what makes the job skip cleanly (no failed run) before
    # CLOUDFLARE_API_TOKEN has been added as a repo secret.
    env:
      HAS_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v5
        if: ${{ env.HAS_CF_TOKEN == 'true' }}

      - name: Deploy
        if: ${{ env.HAS_CF_TOKEN == 'true' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4.110.0"
          workingDirectory: site
          command: deploy
